<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: -apple-system, sans-serif;
    }
    .card {
      width: 320px;
      background: #1c1c1e;
      border-radius: 24px;
      overflow: hidden;
      padding-bottom: 2rem;
    }
    .header {
      height: 180px;
      background: linear-gradient(160deg, #1a1a2e 0%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .icon-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .track-name {
      font-size: 16px; font-weight: 600; color: #fff;
    }
    .track-author {
      font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px;
    }
    .controls { padding: 1.5rem 1.5rem 0; }
    .progress-bar {
      height: 3px; background: #3a3a3c; border-radius: 2px;
      position: relative; cursor: pointer;
    }
    .progress-fill {
      height: 100%; background: #4a90d9; border-radius: 2px; width: 0%;
    }
    .progress-thumb {
      width: 12px; height: 12px;
      background: #4a90d9; border-radius: 50%;
      position: absolute; top: 50%; left: 0%;
      transform: translate(-50%, -50%);
    }
    .time-row {
      display: flex; justify-content: space-between;
      font-size: 11px; color: #888; margin-top: 6px;
    }
    .btn-row {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 1.25rem; padding: 0 0.5rem;
    }
    .btn-icon {
      background: none; border: none; cursor: pointer; padding: 8px;
    }
    .btn-play {
      width: 52px; height: 52px; border-radius: 50%;
      background: #4a90d9; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon-circle">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="17" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
          <path id="play-icon" d="M14 12l10 6-10 6V12z" fill="white"/>
        </svg>
      </div>
      <div style="text-align:center">
        <p class="track-name">Electronic Handshake: Abridged Retinal Fluorescence Lifetimes in Glaucoma</p>  <!-- ← edit this -->
        <p class="track-author">Siddharth Limaye</p> <!-- ← edit this -->
      </div>
    </div>
    <div class="controls">
      <div class="progress-bar" id="bar">
        <div class="progress-fill" id="fill"></div>
        <div class="progress-thumb" id="thumb"></div>
      </div>
      <div class="time-row">
        <span id="cur">0:00</span>
        <span id="dur">0:00</span>
      </div>
      <div class="btn-row">
        <button class="btn-icon" onclick="audio.currentTime=0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#aaa">
            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
          </svg>
        </button>
        <button class="btn-play" id="playbtn" onclick="togglePlay()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white" id="playSvg">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <button class="btn-icon" onclick="audio.currentTime=Math.min(audio.duration,audio.currentTime+15)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#aaa">
            <path d="M18 6h-2v12h2V6zM5 18l8.5-6L5 6v12z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ↓ Point this to your actual .m4a file -->
  <audio id="audio" src="bridge2ai_handshake.m4a"></audio>

  <script>
    const audio = document.getElementById('audio');
    const fill = document.getElementById('fill');
    const thumb = document.getElementById('thumb');
    const cur = document.getElementById('cur');
    const dur = document.getElementById('dur');
    const playSvg = document.getElementById('playSvg');
    const playPath = 'M8 5v14l11-7z';
    const pausePath = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';

    function fmt(s) {
      const m = Math.floor(s/60), sec = Math.floor(s%60);
      return m+':'+(sec<10?'0':'')+sec;
    }
    function togglePlay() {
      audio.paused ? audio.play() : audio.pause();
    }
    audio.addEventListener('play', () => playSvg.querySelector('path').setAttribute('d', pausePath));
    audio.addEventListener('pause', () => playSvg.querySelector('path').setAttribute('d', playPath));
    audio.addEventListener('loadedmetadata', () => dur.textContent = fmt(audio.duration));
    audio.addEventListener('timeupdate', () => {
      const pct = (audio.currentTime / audio.duration) * 100 || 0;
      fill.style.width = pct + '%';
      thumb.style.left = pct + '%';
      cur.textContent = fmt(audio.currentTime);
    });
    document.getElementById('bar').addEventListener('click', e => {
      const r = e.currentTarget.getBoundingClientRect();
      audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    });
  </script>
</body>
</html>
